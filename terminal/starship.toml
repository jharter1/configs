# ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

right_format = "$battery$time"

scan_timeout = 10

command_timeout = 500

format = """
[в•ӯв”Җ ](bold cyan)$username$hostname $sudo$jobs$shlvl
[в”ңв”Җ ](bold cyan)$directory $git_branch$git_status$git_commit
[в”ңв”Җ ](bold cyan)$docker_context$kubernetes $aws $ruby $python $nodejs $golang $rust $package
[в•°в”ҖвқҜ ](bold cyan)$status (dimmed)$cmd_duration $character"""

# Shows if you have sudo cached (security awareness!)
[sudo]
disabled = false
symbol = "рҹ§ҷ "
format = "[$symbol]($style)"
style = "bold red"

# Shows background jobs (handy when you forget about them)
[jobs]
disabled = false
symbol = "вңҰ"
number_threshold = 1
format = "[$symbol$number]($style) "
style = "bold blue"

# Shell nesting level (useful in tmux to know how deep you are)
[shlvl]
disabled = false
threshold = 2
symbol = "вҶ•пёҸ "
format = "[$symbol$shlvl]($style) "
style = "bold yellow"

# Shows package.json version when in a project
[package]
disabled = false
symbol = "рҹ“Ұ "
format = "[$symbol$version]($style) "
style = "bold cyan"

# Fill character (empty space) between the left and right prompt
[fill]
symbol = " "

# Replace the 'вқҜ' symbol in the prompt with 'вһң'
[character]
success_symbol = "[вқҜ](bold green)"
error_symbol = "[вқҜ](bold red)"
vicmd_symbol = "[вқ®](bold yellow)"

# Username and hostname
[username]
disabled = false
format = "[$user](bold purple)"
show_always = true
aliases = { "jackharter" = "рҹҰ‘ jwh" }

[hostname]
disabled = false
ssh_only = false
style = "bold cyan"
format = "[@$hostname]($style)"

# Better directory with home symbol
[directory]
truncation_symbol = 'вҖҰ/'
truncation_length = 3
home_symbol = "~"
style = "bold blue"
format = "[\uEA83 $path]($style)[$read_only]($read_only_style)"
read_only = "рҹ”’"

[git_branch]
symbol = "\uE725"
style = "bold purple"
format = "on [$symbol $branch]($style)"

[git_status]
style = "bold yellow"
format = '([\[$all_status$ahead_behind\]]($style))'
staged = '[вң“ \($count\)](green)'
untracked = '[? \($count\)](blue)'
modified = '[! \($count\)](yellow)'
conflicted = '[Г— \($count\)](red)'
ahead = '[вҮЎ \($count\)](cyan)'
behind = '[вҮЈ \($count\)](cyan)'
diverged = '[вҮ• \($ahead_count\)вҮЎ\($behind_count\)](red)'
up_to_date = '[вң“](green)'
stashed = '[вҡ‘ \($count\)](magenta)'
renamed = '[В» \($count\)](yellow)'
deleted = '[вңҳ \($count\)](red)'

[git_commit]
commit_hash_length = 7
tag_symbol = "рҹҸ·пёҸ "
disabled = false
only_detached = true

[git_metrics]
disabled = true
added_style = "bold green"
deleted_style = "bold red"
format = "[+$added]($added_style)/[-$deleted]($deleted_style)"

[ruby]
disabled = false
symbol = "\uE791 "
format = "[$symbol$version](bold red)"

[python]
disabled = false
symbol = "\uE73C "
format = "[$symbol$version](bold yellow)[ ($virtualenv)](dimmed cyan)"

[nodejs]
disabled = false
symbol = "\uE718 "
format = "[$symbol$version](bold green)"

[golang]
disabled = false
symbol = "\uE626 "
format = "[$symbol$version](bold cyan)"

[rust]
disabled = false
symbol = "\uE7A8 "
format = "[$symbol$version](bold red)"

[terraform]
disabled = true

[azure]
disabled = true

[cmd_duration]
min_time = 500
style = "bold yellow"
show_milliseconds = true
format = "took [$duration]($style)"

[docker_context]
format = '[рҹҗӢ $context](blue bold)'
disabled = false
only_with_files = true

[aws]
disabled = false
symbol = "вҳҒпёҸ "
format = 'on [$symbol$profile(\($region\)) ($duration)](bold yellow) '

[gcloud]
format = 'on [$symbol$account(@$domain)(\($project\))]($style) '
symbol = "вҳҒпёҸ "
disabled = true
style = "bold blue"

[battery]
full_symbol = "рҹ”Ӣ"
charging_symbol = "вҡЎ"
discharging_symbol = "рҹ’Җ"
disabled = false
format = '[$symbol $percentage]($style) '
display = [
    { style = "red bold", threshold = 15 },
    { style = "yellow bold", threshold = 30 },
    { style = "green bold", threshold = 100 }
]

[time]
disabled = false
use_12hr = false
format = '[вҢҡ $time]($style)'
time_format = '%H:%M'
style = "bold green"

[status]
disabled = false
format = '[$symbol $status]($style) '
symbol = "вңҳ"
not_executable_symbol = "рҹҡ«"
not_found_symbol = "рҹ”Қ"
sigint_symbol = "рҹ§ұ"
signal_symbol = "вҡЎ"

[kubernetes]
symbol = "\uE81D "
format = '[$symbol$context ($namespace)](dimmed cyan) '
disabled = false

