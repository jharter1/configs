# ~/.config/starship.toml



# Get editor completions based on the config schema

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

right_format = "$battery$time"

scan_timeout = 500

command_timeout = 6000



# Customize the prompt order and format

# Add these to your existing modules in the 3-line format:

format = """

[╭─](bold cyan)$username$hostname[ -> ](bold cyan)$sudo$jobs$shlvl
[├─](bold cyan)$directory$git_branch$git_status$git_commit$git_metrics$git_state$docker_context$kubernetes$aws $ruby$python$nodejs$package
[╰─❯](bold cyan) $status $cmd_duration $character"""



# Show macOS logo (just looks cool)

[os]

disabled = false

format = "[$symbol](bold white)"

[os.symbols]


Macos = " "  # Apple icon



# Shows if you have sudo cached (security awareness!)

[sudo]

disabled = false

symbol = "🧙 "

format = "[$symbol]($style)"

style = "bold red"



# Shows background jobs (handy when you forget about them)

[jobs]

disabled = false

symbol = "✦"

number_threshold = 1

format = "[$symbol$number]($style) "

style = "bold blue"



# Shell nesting level (useful in tmux to know how deep you are)

[shlvl]

disabled = false

threshold = 2

symbol = "↕️ "

format = "[$symbol$shlvl]($style) "

style = "bold yellow"



# Shows package.json version when in a project

[package]

disabled = false

symbol = "📦 "

format = "[$symbol$version]($style) "

style = "bold cyan"



# Fill character (empty space) between the left and right prompt

[fill]

symbol = " "



# Replace the '❯' symbol in the prompt with '➜'

[character] # The name of the module we are configuring is 'character'

success_symbol = "[❯](bold green)"

error_symbol = "[❯](bold red)"

vicmd_symbol = "[❮](bold yellow)" # Vim mode indicator



# Username and hostname

[username]

disabled = false

format = "[$user](bold purple)"

show_always = true

aliases = { "jackharter" = "🦑 jwh" }



[hostname]

disabled = false

ssh_only = false

style = "bold cyan"

format = "[@$hostname]($style)"



# Better directory with home symbol

[directory]

truncation_symbol = '…/'

truncation_length = 3

home_symbol = "~"

style = "bold blue"

format = "[📂 $path]($style)[$read_only]($read_only_style) "

read_only = "🔒"



[git_branch]

symbol = " "

style = "bold purple"

format = "on [$symbol$branch]($style)"



[git_status]

style = "bold yellow"

format = '([\[$all_status$ahead_behind\]]($style))'

staged = '[+\($count\)](green)'

untracked = '[?\($count\)](red)'

modified = '[!\($count\)](yellow)'

conflicted = '=$(count)'

ahead = '⇡${count}'

behind = '⇣${count}'

diverged = '⇕⇡${ahead_count}⇣${behind_count}'

up_to_date = '✓'

stashed = '⚑'

renamed = '»$count'

deleted = '✘$count'



[git_commit]

commit_hash_length = 7

tag_symbol = "🏷️ "

disabled = false

only_detached = true



[git_metrics]

disabled = false

added_style = "bold green"

deleted_style = "bold red"

format = "[+$added]($added_style)/[-$deleted]($deleted_style)"



[ruby] # Display rbenv version if an rbenv version is set

disabled = false

symbol = "💎 "

format = "via [$symbol$version](bold red)"





[python] # Display pyenv version if a pyenv version is set

disabled = false

symbol = "🐍 "

format = "via [$symbol$version](bold white)"



[nodejs] # Display node version if a node version is style_root

disabled = false

symbol = "⬢ "

format = "via [$symbol$version](bold green)"





[golang] # Display go version if a go version is set

disabled = false

symbol = "🐹 "

format = "via [$symbol$version](bold cyan)"



[rust] # Display rust version if a rust version is set

disabled = false

symbol = "🦀 "

format = "via [$symbol$version](bold red)"



[azure]

disabled = false

format = "on [$symbol($username)]($style) "

symbol = "󰠅 "

style = "blue"



[cmd_duration]

min_time = 500

style = "bold yellow"

show_milliseconds = true

format = "took [$duration]($style)"



[docker_context]

format = 'via [🐋 $context](blue bold)'

disabled = false

only_with_files = true



[aws]

disabled = false

symbol = "☁️ "

format = 'on [$symbol$profile(\($region\)) ($duration)](bold yellow) '



[gcloud]

format = 'on [$symbol$account(@$domain)(\($project\))]($style) '

symbol = "☁️ "

disabled = true

style = "bold blue"



# Battery status, comment this out if you're on a desktop or you don't care about battery status

[battery]

full_symbol = "🔋"

charging_symbol = "⚡"

discharging_symbol = "💀"

disabled = false

format = '[$symbol $percentage]($style) '

display = [ 

    { style = "red bold", threshold = 15 }, 

    { style = "yellow bold", threshold = 30 }, 

    { style = "green bold", threshold = 100 } 

]



# Time module

[time]

disabled = false

use_12hr = false

format = '[⌚ $time]($style)'

time_format = '%H:%M'

style = "bold green"



[status] # Add status module to show exit codes

disabled = false

format = '[$symbol $status]($style) '

symbol = "✘"

not_executable_symbol = "🚫"

not_found_symbol = "🔍"

sigint_symbol = "🧱"

signal_symbol = "⚡"



[kubernetes]

format = 'via [⛵️ $context \($namespace\)](dimmed cyan) '

disabled = false



[helm]

format = 'via [⎈ $version](bold white) '



[terraform]

format = '[🚜 $version $workspace]($style) '



# ~/.config/starship.toml



[vagrant]

format = 'via [⍱ $version](bold white) '
