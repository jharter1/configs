# ~/.config/starship.toml

"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

# Language/tool context on the right — only renders in relevant project directories
right_format = "$docker_context$ruby$python$nodejs$golang$rust$package"

scan_timeout = 10
command_timeout = 500

format = """
[╭─ ](bold cyan)$username$hostname$sudo$jobs$shlvl${fill}$battery$time
[├─ ](bold cyan)$directory $git_branch$git_state$git_status$git_commit${fill}$kubernetes$aws$azure
[╰─❯ ](bold cyan)$status$cmd_duration$character"""

# ── Line 1: Identity ──────────────────────────────────────────────────────────

# Sudo cached (security awareness)
[sudo]
disabled = false
symbol = "\uF023 "
format = "[$symbol]($style)"
style = "bold red"

# Background jobs
[jobs]
disabled = false
symbol = "✦"
number_threshold = 1
format = " [$symbol$number]($style)"
style = "bold blue"

# Shell nesting level (tmux awareness)
[shlvl]
disabled = false
threshold = 2
symbol = "\uF126 "
format = " [$symbol$shlvl]($style)"
style = "bold yellow"

[username]
disabled = false
format = "[$user](bold purple)"
show_always = true
aliases = { "jackharter" = "\uF1BF jwh" }

[hostname]
disabled = false
ssh_only = false
style = "bold cyan"
format = "[@$hostname]($style)"

# ── Line 2: Directory + Git ───────────────────────────────────────────────────

[directory]
truncation_symbol = "…/"
truncation_length = 3
home_symbol = "~"
style = "bold blue"
format = "[\uEA83 $path]($style)[$read_only]($read_only_style)"
read_only = " \uF023"
read_only_style = "bold red"

[git_branch]
symbol = "\uE725 "
style = "bold purple"
format = 'on [$symbol$branch]($style) '
truncation_length = 28
truncation_symbol = "…"

# Shows MERGING / REBASING / CHERRY-PICKING etc.
[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold red"

[git_status]
style = "bold yellow"
format = '([\[$all_status$ahead_behind\]]($style) )'
staged = '[✓ \($count\)](green)'
untracked = '[? \($count\)](blue)'
modified = '[! \($count\)](yellow)'
conflicted = '[× \($count\)](red)'
ahead = '[⇡\($count\)](cyan)'
behind = '[⇣\($count\)](cyan)'
diverged = '[⇕\($ahead_count\)⇡\($behind_count\)](red)'
up_to_date = '[✓](green)'
stashed = '[⚑\($count\)](magenta)'
renamed = '[» \($count\)](yellow)'
deleted = '[✘\($count\)](red)'

[git_commit]
commit_hash_length = 7
tag_symbol = "\uF02B "
disabled = false
only_detached = true

[git_metrics]
disabled = true
added_style = "bold green"
deleted_style = "bold red"
format = "[+$added]($added_style)/[-$deleted]($deleted_style)"

# ── Line 3: Input ─────────────────────────────────────────────────────────────

[cmd_duration]
min_time = 500
style = "dimmed yellow"
show_milliseconds = true
format = "[took $duration]($style) "

[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "✘ "
not_executable_symbol = "\uF05E "
not_found_symbol = "\uF002 "
sigint_symbol = "✋ "
signal_symbol = "\uF0E7 "
style = "bold red"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold yellow)"

# ── Right: Language / tool context ────────────────────────────────────────────

[ruby]
disabled = false
symbol = "\uE791 "
format = "[$symbol$version]($style) "
style = "bold red"

[python]
disabled = false
symbol = "\uE73C "
format = "[$symbol$version]($style)[ ($virtualenv)](dimmed cyan) "
style = "bold yellow"

[nodejs]
disabled = false
symbol = "\uE718 "
format = "[$symbol$version]($style) "
style = "bold green"
detect_files = ["package.json", ".node-version", "node_modules"]
detect_folders = ["node_modules"]

[golang]
disabled = false
symbol = "\uE626 "
format = "[$symbol$version]($style) "
style = "bold cyan"

[rust]
disabled = false
symbol = "\uE7A8 "
format = "[$symbol$version]($style) "
style = "bold red"

[package]
disabled = false
symbol = "\uF187 "
format = "[$symbol$version]($style) "
style = "dimmed cyan"

[docker_context]
symbol = "\uF308 "
format = "[$symbol$context]($style) "
style = "bold blue"
disabled = false
only_with_files = true

[aws]
disabled = false
symbol = "\uF0C2 "
format = '[$symbol$profile(\($region\))( \[$duration\])]($style) '
style = "bold yellow"

[kubernetes]
symbol = "\uE81D "
format = '[$symbol$context](dimmed cyan) '
disabled = false

# ── Right: Utilities ──────────────────────────────────────────────────────────

# Only shown when battery drops below 30%; no always-on green entry
[battery]
disabled = false
charging_symbol = "\uF0E7 "
discharging_symbol = "\uF244 "
format = "[$symbol$percentage]($style) "
display = [
    { threshold = 15, style = "bold red" },
    { threshold = 30, style = "bold yellow" },
]

[time]
disabled = false
use_12hr = false
format = "[\uF017 $time]($style)"
time_format = "%H:%M"
style = "bold green"

[fill]
symbol = " "

[terraform]
disabled = true

[azure]
disabled = false
format = '[$symbol$subscription]($style) '
style = "bold #0078D4"

[gcloud]
disabled = true
