
# Update config file continuously and display 
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Slightly more intuitive pane splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ctrl-S seems simpler
set -g prefix C-s

# Status bar setup
set -g status-position top
set -g status-interval 15

# improve window numbering
set -g base-index 1           # Start windows at 1, not 0
set -g pane-base-index 1      # Start panes at 1, not 0
set -g renumber-windows on    # Renumber when windows are closed

# Faster command sequences (no delay after ESC)
set -sg escape-time 0

# More scrollback history (balanced for speed vs memory)
set -g history-limit 10000

# Smart automatic window rename: show folder when idle, command when running
set -g automatic-rename on
set -g automatic-rename-format '#{?#{==:#{pane_current_command},fish},#{b:pane_current_path},#{pane_current_command}}'

# Active pane border highlight (Dracula purple), inactive gray
set -g pane-active-border-style 'fg=colour171,bold'
set -g pane-border-style 'fg=colour238'

# macOS clipboard integration
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Quick window switching with Shift+arrow (usually works fine on macOS)
bind -n S-Left previous-window
bind -n S-Right next-window

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'dracula/tmux'
set -g @plugin 'omerxx/tmux-sessionx'

# tmux-sessionx: fzf session switcher bound to <prefix>o
set -g @sessionx-bind 'o'

# configure resurrect/continuum
set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# dracula plugins
set -g @dracula-show-left-icon ✡
set -g @dracula-show-powerline true

# Banner at the top of the page (lean for performance)
set -g @dracula-plugins "git ssh-session cwd time"
set -g @dracula-show-empty-plugins false
set -g @dracula-cwd-path 1
set -g @dracula-show-ssh-only-when-connected true

# set 256 colors
set -s default-terminal 'tmux-256color'

# Enable mouse control
set -g mouse on

# keep this at the bottom
run -b '~/.tmux/plugins/tpm/tpm' 

